<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Instagram Comment Activity Deleter</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="shell">
      <header>
        <h1>Comment Activity</h1>
        <span id="pageStatus" class="badge">Checking tab</span>
      </header>

      <form id="controls" class="controls">
        <label class="toggle">
          <input id="dryRun" type="checkbox" checked>
          <span>Dry run</span>
        </label>

        <div class="grid">
          <label>
            <span>Batch size</span>
            <input id="batchSize" type="number" min="1" max="50" step="1" value="3">
          </label>
          <label>
            <span>Max batches</span>
            <input id="maxBatches" type="number" min="1" max="100" step="1" value="1">
          </label>
          <label>
            <span>Action delay</span>
            <input id="actionDelayMs" type="number" min="0" max="10000" step="100" value="1000">
          </label>
          <label>
            <span>Checkbox delay</span>
            <input id="checkboxDelayMs" type="number" min="0" max="5000" step="50" value="300">
          </label>
        </div>

        <section id="deleteConfirm" class="danger" hidden>
          <label>
            <span>Type DELETE to enable deletion</span>
            <input id="confirmDelete" type="text" autocomplete="off" spellcheck="false" placeholder="DELETE">
          </label>
        </section>

        <div class="actions">
          <button id="runButton" type="submit">Run</button>
          <button id="resetButton" type="button">Reset selection</button>
        </div>
      </form>

      <section id="output" class="output" aria-live="polite"></section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
